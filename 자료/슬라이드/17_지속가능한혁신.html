<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>슬라이드 17 — 지속가능한 혁신 | 고용노동부 AX</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #050a16;
      font-family: 'Pretendard', 'Malgun Gothic', '맑은 고딕', -apple-system, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .slide-wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide {
      width: min(100vw, calc(100vh * 16/9));
      height: min(100vh, calc(100vw * 9/16));
      background: linear-gradient(135deg, #0b1220 0%, #0f1a2e 50%, #0b1220 100%);
      color: #f1f5f9;
      position: relative;
      overflow: hidden;
      --u: calc(min(100vw, calc(100vh * 16/9)) / 1920);
    }

    .slide::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: calc(8 * var(--u));
      background: linear-gradient(180deg, #38bdf8 0%, #60a5fa 50%, #38bdf8 100%);
      box-shadow: 0 0 calc(20 * var(--u)) rgba(96, 165, 250, 0.45);
    }

    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(148, 163, 184, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(148, 163, 184, 0.02) 1px, transparent 1px);
      background-size: calc(80 * var(--u)) calc(80 * var(--u));
      pointer-events: none;
    }

    /* Header */
    .slide-top {
      position: absolute;
      top: calc(70 * var(--u));
      left: calc(90 * var(--u));
      right: calc(90 * var(--u));
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 2;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: calc(18 * var(--u));
    }

    .brand-mark {
      width: calc(64 * var(--u));
      height: calc(64 * var(--u));
      background: url('../고용노동부.png') center/contain no-repeat;
      flex-shrink: 0;
    }

    .brand-text .ko {
      font-size: calc(26 * var(--u));
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: 0.01em;
    }

    .brand-text .en {
      font-size: calc(12 * var(--u));
      font-weight: 500;
      color: #94a3b8;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-top: calc(2 * var(--u));
    }

    .venue {
      text-align: right;
      line-height: 1.4;
    }

    .venue-label {
      display: block;
      font-size: calc(13 * var(--u));
      color: #94a3b8;
      font-weight: 500;
      letter-spacing: 0.18em;
      margin-bottom: calc(6 * var(--u));
    }

    .venue-text {
      font-size: calc(20 * var(--u));
      color: #e2e8f0;
      font-weight: 500;
    }

    /* Body */
    .slide-body {
      position: absolute;
      left: calc(120 * var(--u));
      right: calc(90 * var(--u));
      top: calc(190 * var(--u));
      bottom: calc(76 * var(--u));
      z-index: 2;
      display: flex;
      flex-direction: column;
    }

    .eyebrow {
      font-size: calc(22 * var(--u));
      font-weight: 600;
      letter-spacing: 0.18em;
      color: #7dd3fc;
      flex-shrink: 0;
    }

    .rule {
      width: calc(96 * var(--u));
      height: calc(4 * var(--u));
      background: linear-gradient(90deg, #38bdf8 0%, #60a5fa 100%);
      margin: calc(14 * var(--u)) 0;
      border-radius: calc(2 * var(--u));
      flex-shrink: 0;
    }

    /* Title row */
    .title-row {
      display: flex;
      align-items: center;
      gap: calc(20 * var(--u));
      flex-shrink: 0;
      margin-bottom: calc(16 * var(--u));
    }

    .p-num-lg {
      font-size: calc(80 * var(--u));
      font-weight: 900;
      color: rgba(52, 211, 153, 0.18);
      line-height: 1;
      flex-shrink: 0;
      letter-spacing: -0.04em;
    }

    .title-text .main-title {
      font-size: calc(48 * var(--u));
      font-weight: 900;
      color: #f8fafc;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: calc(6 * var(--u));
    }

    .title-text .main-sub {
      font-size: calc(17 * var(--u));
      color: #94a3b8;
      line-height: 1.5;
    }

    /* Flywheel wrapper */
    .flywheel-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flywheel-svg {
      max-width: 100%;
      max-height: 100%;
    }

    /* Footer */
    .slide-foot {
      position: absolute;
      left: calc(120 * var(--u));
      bottom: calc(36 * var(--u));
      z-index: 2;
      font-size: calc(13 * var(--u));
      font-weight: 500;
      letter-spacing: 0.22em;
      color: #94a3b8;
    }

    .slide-foot .cur {
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="slide-wrap">
    <div class="slide">

      <header class="slide-top">
        <div class="brand">
          <div class="brand-mark"></div>
          <div class="brand-text">
            <div class="ko">고용노동부</div>
            <div class="en">Ministry of Employment and Labor</div>
          </div>
        </div>
        <div class="venue">
          <span class="venue-label">장소</span>
          <span class="venue-text">국가인공지능전략위원회 세미나</span>
        </div>
      </header>

      <main class="slide-body">
        <div class="eyebrow">04. 고용노동부 AX 추진 방향</div>
        <div class="rule"></div>

        <!-- Title row -->
        <div class="title-row">
          <div class="p-num-lg">③</div>
          <div class="title-text">
            <div class="main-title">지속가능한 혁신</div>
            <div class="main-sub">업무 결과가 데이터로 축적되고, 축적된 데이터가 다시 업무를 개선하는 선순환</div>
          </div>
        </div>

        <!-- Flywheel SVG -->
        <div class="flywheel-wrap">
          <svg class="flywheel-svg" viewBox="0 0 900 520" preserveAspectRatio="xMidYMid meet"
            xmlns="http://www.w3.org/2000/svg">
            <defs>
              <!-- 카드별 색상 화살표 마커 -->
              <marker id="arr-blue"   markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0,11 4,0 8" fill="rgba(56,189,248,0.90)"/></marker>
              <marker id="arr-amber"  markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0,11 4,0 8" fill="rgba(251,191,36,0.90)"/></marker>
              <marker id="arr-violet" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0,11 4,0 8" fill="rgba(167,139,250,0.90)"/></marker>
              <marker id="arr-green"  markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0,11 4,0 8" fill="rgba(52,211,153,0.90)"/></marker>
            </defs>

            <!--
            타원 rx=240 ry=190, 중심(450,260)
            카드: N=(450,70) E=(690,260) S=(450,450) W=(210,260)
            호 끝점(카드 테두리 × 타원):
              N 우측(x=545)→y=86   /  E 상단(y=220)→x=685
              E 하단(y=300)→x=685  /  S 우측(x=545)→y=435
              S 좌측(x=355)→y=435  /  W 하단(y=300)→x=215
              W 상단(y=220)→x=215  /  N 좌측(x=355)→y=86
            -->

            <!-- Glow ellipse -->
            <ellipse cx="450" cy="260" rx="240" ry="190" fill="none" stroke="rgba(148,163,184,0.04)" stroke-width="68"/>
            <ellipse cx="450" cy="260" rx="240" ry="190" fill="none" stroke="rgba(148,163,184,0.12)" stroke-width="1"/>

            <!-- Arc ①: 업무수행(N) → 데이터축적(E), blue -->
            <path d="M 545 86 A 240 190 0 0 1 685 220" stroke="rgba(56,189,248,0.75)" stroke-width="2.5" fill="none"
              marker-end="url(#arr-blue)" stroke-dasharray="8,5" />
            <text x="638" y="128" text-anchor="middle" fill="rgba(56,189,248,0.90)" font-size="17"
              font-family="Pretendard,sans-serif">결과 데이터</text>

            <!-- Arc ②: 데이터축적(E) → AI분석(S), amber -->
            <path d="M 685 300 A 240 190 0 0 1 545 435" stroke="rgba(245,158,11,0.75)" stroke-width="2.5" fill="none"
              marker-end="url(#arr-amber)" stroke-dasharray="8,5" />
            <text x="648" y="400" text-anchor="middle" fill="rgba(251,191,36,0.90)" font-size="17"
              font-family="Pretendard,sans-serif">분석 요청</text>

            <!-- Arc ③: AI분석(S) → 업무개선(W), violet -->
            <path d="M 355 435 A 240 190 0 0 1 215 300" stroke="rgba(167,139,250,0.75)" stroke-width="2.5" fill="none"
              marker-end="url(#arr-violet)" stroke-dasharray="8,5" />
            <text x="258" y="405" text-anchor="middle" fill="rgba(167,139,250,0.90)" font-size="17"
              font-family="Pretendard,sans-serif">인사이트</text>

            <!-- Arc ④: 업무개선(W) → 업무수행(N), green -->
            <path d="M 215 220 A 240 190 0 0 1 355 86" stroke="rgba(52,211,153,0.75)" stroke-width="2.5" fill="none"
              marker-end="url(#arr-green)" stroke-dasharray="8,5" />
            <text x="258" y="118" text-anchor="middle" fill="rgba(52,211,153,0.90)" font-size="17"
              font-family="Pretendard,sans-serif">개선 방향</text>

            <!-- Node: 업무 수행 (N — 12시, blue) -->
            <rect x="355" y="30" width="190" height="80" rx="10" fill="rgba(56,189,248,0.06)"
              stroke="rgba(56,189,248,0.30)" stroke-width="1.5" />
            <text x="450" y="71" text-anchor="middle" fill="#7dd3fc" font-size="26" font-weight="700"
              font-family="Pretendard,sans-serif">업무 수행</text>
            <text x="450" y="94" text-anchor="middle" fill="#94a3b8" font-size="17"
              font-family="Pretendard,sans-serif">서비스 · 감독 · 상담 · 행정</text>

            <!-- Node: 데이터 축적 (E — 3시, amber) -->
            <rect x="595" y="220" width="190" height="80" rx="10" fill="rgba(245,158,11,0.06)"
              stroke="rgba(245,158,11,0.30)" stroke-width="1.5" />
            <text x="690" y="261" text-anchor="middle" fill="#fbbf24" font-size="26" font-weight="700"
              font-family="Pretendard,sans-serif">데이터 축적</text>
            <text x="690" y="284" text-anchor="middle" fill="#94a3b8" font-size="17"
              font-family="Pretendard,sans-serif">로그 · 기록 · 결과 구조화</text>

            <!-- Node: AI 분석·학습 (S — 6시, violet) -->
            <rect x="355" y="410" width="190" height="80" rx="10" fill="rgba(167,139,250,0.06)"
              stroke="rgba(167,139,250,0.30)" stroke-width="1.5" />
            <text x="450" y="451" text-anchor="middle" fill="#c4b5fd" font-size="26" font-weight="700"
              font-family="Pretendard,sans-serif">AI 분석 · 학습</text>
            <text x="450" y="474" text-anchor="middle" fill="#94a3b8" font-size="17"
              font-family="Pretendard,sans-serif">패턴 인식 · 예측 · 최적화</text>

            <!-- Node: 업무 개선 (W — 9시, green) -->
            <rect x="115" y="220" width="190" height="80" rx="10" fill="rgba(52,211,153,0.07)"
              stroke="rgba(52,211,153,0.30)" stroke-width="1.5" />
            <text x="210" y="261" text-anchor="middle" fill="#6ee7b7" font-size="26" font-weight="700"
              font-family="Pretendard,sans-serif">업무 개선</text>
            <text x="210" y="284" text-anchor="middle" fill="#94a3b8" font-size="17"
              font-family="Pretendard,sans-serif">프로세스 개선 · 판단 지원</text>

            <!-- Center circle -->
            <circle cx="450" cy="260" r="103" fill="rgba(148,163,184,0.05)" stroke="rgba(148,163,184,0.22)"
              stroke-width="1.5" />
            <text x="450" y="230" text-anchor="middle" fill="#e2e8f0" font-size="30" font-weight="800"
              font-family="Pretendard,sans-serif">데이터 기반</text>
            <text x="450" y="270" text-anchor="middle" fill="#e2e8f0" font-size="30" font-weight="800"
              font-family="Pretendard,sans-serif">의사결정</text>
            <text x="450" y="310" text-anchor="middle" fill="#e2e8f0" font-size="30" font-weight="800"
              font-family="Pretendard,sans-serif">선순환</text>
          </svg>
        </div>
      </main>

      <div class="slide-foot"><span class="cur">17</span> / 18</div>
    </div>
  </div>
</body>

</html>
