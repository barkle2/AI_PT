<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>슬라이드 05 — 고용노동부와 AX | 고용노동부 AX 추진 현황 및 향후 계획</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #050a16;
      font-family: 'Pretendard', 'Malgun Gothic', '맑은 고딕', -apple-system, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* 16:9 슬라이드 컨테이너 (시리즈 동일) */
    .slide-wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide {
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      background: linear-gradient(135deg, #0b1220 0%, #0f1a2e 50%, #0b1220 100%);
      color: #f1f5f9;
      position: relative;
      overflow: hidden;
      --u: calc(min(100vw, calc(100vh * 16 / 9)) / 1920);
    }

    /* 좌측 액센트 바 (시리즈 동일) */
    .slide::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: calc(8 * var(--u));
      background: linear-gradient(180deg, #38bdf8 0%, #60a5fa 50%, #38bdf8 100%);
      box-shadow: 0 0 calc(20 * var(--u)) rgba(96, 165, 250, 0.45);
    }

    /* 미세 그리드 패턴 (시리즈 동일) */
    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.02) 1px, transparent 1px);
      background-size: calc(80 * var(--u)) calc(80 * var(--u));
      pointer-events: none;
    }

    /* 상단 식별 영역 (시리즈 동일) */
    .slide-top {
      position: absolute;
      top: calc(70 * var(--u));
      left: calc(90 * var(--u));
      right: calc(90 * var(--u));
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 2;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: calc(18 * var(--u));
    }

    .brand-mark {
      width: calc(64 * var(--u));
      height: calc(64 * var(--u));
      background: url('../고용노동부.png') center/contain no-repeat;
      flex-shrink: 0;
    }

    .brand-text {
      line-height: 1.15;
    }

    .brand-text .ko {
      font-size: calc(26 * var(--u));
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: 0.01em;
    }

    .brand-text .en {
      font-size: calc(12 * var(--u));
      font-weight: 500;
      color: #94a3b8;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-top: calc(2 * var(--u));
    }

    .venue {
      text-align: right;
      line-height: 1.4;
    }

    .venue-label {
      display: block;
      font-size: calc(13 * var(--u));
      color: #94a3b8;
      font-weight: 500;
      letter-spacing: 0.18em;
      margin-bottom: calc(6 * var(--u));
    }

    .venue-text {
      font-size: calc(20 * var(--u));
      color: #e2e8f0;
      font-weight: 500;
    }

    /* 본문 — 시리즈 동일 좌표 */
    .slide-body {
      position: absolute;
      left: calc(120 * var(--u));
      right: calc(90 * var(--u));
      top: calc(190 * var(--u));
      bottom: calc(140 * var(--u));
      z-index: 2;
      display: flex;
      flex-direction: column;
    }

    /* 헤더 — 시리즈 동일 톤 */
    .eyebrow {
      font-size: calc(22 * var(--u));
      font-weight: 600;
      letter-spacing: 0.18em;
      color: #7dd3fc;
    }

    .rule {
      width: calc(96 * var(--u));
      height: calc(4 * var(--u));
      background: linear-gradient(90deg, #38bdf8 0%, #60a5fa 100%);
      margin: calc(28 * var(--u)) 0 calc(28 * var(--u));
      border-radius: calc(2 * var(--u));
    }

    .main-title {
      font-size: calc(50 * var(--u));
      font-weight: 800;
      color: #f8fafc;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: calc(40 * var(--u));
    }

    /* 2x2 카드 그리드 */
    .grid-2x2 {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: calc(28 * var(--u));
    }

    .card {
      position: relative;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.05) 0%, rgba(96, 165, 250, 0.10) 100%);
      border: 1px solid rgba(56, 189, 248, 0.22);
      border-left: calc(2 * var(--u)) solid #38bdf8;
      border-radius: calc(8 * var(--u));
      padding: calc(38 * var(--u)) calc(48 * var(--u));
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      box-shadow: inset calc(2 * var(--u)) 0 calc(16 * var(--u)) rgba(56, 189, 248, 0.18);
    }

    /* 카드별 좌측 보더·인셋 글로우 미세 톤 차등 (sky 시스템 내부) */
    .card.c1 {
      border-left-color: #7dd3fc;
      box-shadow: inset calc(2 * var(--u)) 0 calc(18 * var(--u)) rgba(125, 211, 252, 0.22);
    }

    .card.c2 {
      border-left-color: #38bdf8;
      box-shadow: inset calc(2 * var(--u)) 0 calc(16 * var(--u)) rgba(56, 189, 248, 0.20);
    }

    .card.c3 {
      border-left-color: #38bdf8;
      box-shadow: inset calc(2 * var(--u)) 0 calc(16 * var(--u)) rgba(56, 189, 248, 0.20);
    }

    .card.c4 {
      border-left-color: #60a5fa;
      box-shadow: inset calc(2 * var(--u)) 0 calc(18 * var(--u)) rgba(96, 165, 250, 0.22);
    }

    /* 번호 칩 — 인라인 텍스트에서 살짝 둥근 chip 스타일 */
    .card .num {
      display: inline-block;
      font-size: calc(15 * var(--u));
      font-weight: 700;
      letter-spacing: 0.32em;
      color: #7dd3fc;
      padding: calc(6 * var(--u)) calc(14 * var(--u)) calc(6 * var(--u)) calc(14 * var(--u));
      border: 1px solid rgba(125, 211, 252, 0.35);
      border-radius: calc(999 * var(--u));
      background: rgba(125, 211, 252, 0.06);
    }

    /* 헤로 — 위계 대폭 강화 (104u, weight 900, 더 타이트한 letter-spacing) */
    .card .hero {
      font-size: calc(104 * var(--u));
      font-weight: 900;
      color: #7dd3fc;
      letter-spacing: -0.035em;
      line-height: 0.98;
      margin: calc(22 * var(--u)) 0 calc(20 * var(--u));
      white-space: nowrap;
    }

    /* 카드별 헤로 색 차등 (sky 시스템 대각선 톤 그라데이션) */
    .card.c1 .hero {
      color: #bae6fd;
    }

    .card.c2 .hero {
      color: #7dd3fc;
    }

    .card.c3 .hero {
      color: #7dd3fc;
    }

    .card.c4 .hero {
      color: #60a5fa;
    }

    /* 카드 4 헤로 — 두 줄 자연 분리. 폰트 크기 살짝 줄여 두 카드 간 무게 균형 */
    .card .hero.two-line {
      font-size: calc(76 * var(--u));
      line-height: 1.02;
      letter-spacing: -0.035em;
      white-space: normal;
    }

    /* 카드 4 헤로 — 다른 카드와 동일 사이즈 */
    .card.c4 .hero {
      font-size: calc(104 * var(--u));
      letter-spacing: -0.035em;
    }

    .card .hero .arrow {
      color: #bae6fd;
      font-weight: 700;
      padding: 0 calc(6 * var(--u));
    }

    /* head 위계 분리 — 첫 줄 강조(화이트), 둘째 줄 톤다운(슬레이트) */
    .card .head {
      font-size: calc(28 * var(--u));
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.012em;
      line-height: 1.25;
      margin-bottom: calc(8 * var(--u));
    }

    .card .head+.head {
      font-size: calc(22 * var(--u));
      font-weight: 500;
      color: #94a3b8;
      letter-spacing: -0.005em;
      line-height: 1.45;
      margin-top: calc(2 * var(--u));
      margin-bottom: 0;
    }

    .card .body {
      font-size: calc(18 * var(--u));
      font-weight: 500;
      line-height: 1.55;
      color: #cbd5e1;
    }

    /* 페이지 번호 (시리즈 동일) */
    .slide-foot {
      position: absolute;
      left: calc(120 * var(--u));
      bottom: calc(60 * var(--u));
      z-index: 2;
      font-size: calc(13 * var(--u));
      font-weight: 500;
      letter-spacing: 0.22em;
      color: #64748b;
    }

    .slide-foot .cur {
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="slide-wrap">
    <div class="slide">
      <header class="slide-top">
        <div class="brand">
          <div class="brand-mark"></div>
          <div class="brand-text">
            <div class="ko">고용노동부</div>
            <div class="en">Ministry of Employment and Labor</div>
          </div>
        </div>
        <div class="venue">
          <span class="venue-label">장소</span>
          <span class="venue-text">국가인공지능전략위원회 세미나</span>
        </div>
      </header>

      <main class="slide-body">
        <div class="eyebrow">01. AX 추진 필요성</div>
        <div class="rule"></div>
        <h1 class="main-title">고용노동부와 AX</h1>

        <div class="grid-2x2">
          <!-- 카드 1 -->
          <div class="card c1">
            <div>
              <span class="num">01</span>
              <div class="hero">방대한 데이터</div>
            </div>
            <div>
              <div class="head">5,200만 전국민 대상 서비스</div>
              <div class="head">4대 사회보험 중 고용보험·산재보험 운영</div>
            </div>
          </div>

          <!-- 카드 2 -->
          <div class="card c2">
            <div>
              <span class="num">02</span>
              <div class="hero">신속한 피드백</div>
            </div>
            <div>
              <div class="head">특별행정기관 및 산하기관</div>
              <div class="head">약 3만명의 직원을 통한 신속한 현장 의견 수렴</div>
            </div>
          </div>

          <!-- 카드 3 -->
          <div class="card c3">
            <div>
              <span class="num">03</span>
              <div class="hero">데이터 신뢰도</div>
            </div>
            <div>
              <div class="head">노 <span class="arrow">⇄</span> 사 관계를 통한 데이터 상호 검증</div>
            </div>
          </div>

          <!-- 카드 4 -->
          <div class="card c4">
            <div>
              <span class="num">04</span>
              <div class="hero">고용분야 DX 경험</div>
            </div>
            <div>
              <div class="head">일자리 데이터를 통합한 국가일자리정보플랫폼 운영 경험</div>
            </div>
          </div>
        </div>
      </main>

      <footer class="slide-foot">
        <span class="cur">05</span> &nbsp;/&nbsp; 18
      </footer>
    </div>
  </div>
</body>

</html>
