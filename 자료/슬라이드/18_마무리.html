<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>슬라이드 18 — 감사합니다 | 고용노동부 AX</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width:100%; height:100%; background:#050a16; font-family:'Pretendard','Malgun Gothic','맑은 고딕',-apple-system,sans-serif; overflow:hidden; -webkit-font-smoothing:antialiased; }
    .slide-wrap { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
    .slide {
      width:min(100vw, calc(100vh * 16/9));
      height:min(100vh, calc(100vw * 9/16));
      background:linear-gradient(135deg,#0b1220 0%,#0f1a2e 50%,#0b1220 100%);
      color:#f1f5f9; position:relative; overflow:hidden;
      --u: calc(min(100vw, calc(100vh * 16/9)) / 1920);
    }

    /* Left blue accent */
    .slide::before {
      content:''; position:absolute; left:0; top:0; bottom:0;
      width:calc(8 * var(--u));
      background:linear-gradient(180deg,#38bdf8 0%,#60a5fa 50%,#38bdf8 100%);
      box-shadow:0 0 calc(20 * var(--u)) rgba(96,165,250,0.45);
    }

    /* Grid */
    .slide::after {
      content:''; position:absolute; inset:0;
      background-image:linear-gradient(rgba(148,163,184,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,0.02) 1px,transparent 1px);
      background-size:calc(80 * var(--u)) calc(80 * var(--u));
      pointer-events:none;
    }

    /* Soft glow behind center text */
    .bg-glow {
      position:absolute;
      left:50%; top:50%;
      transform:translate(-50%, -50%);
      width:calc(600 * var(--u)); height:calc(400 * var(--u));
      background:radial-gradient(ellipse at center, rgba(56,189,248,0.07) 0%, transparent 70%);
      pointer-events:none;
      z-index:1;
    }

    /* Header */
    .slide-top { position:absolute; top:calc(70 * var(--u)); left:calc(90 * var(--u)); right:calc(90 * var(--u)); display:flex; justify-content:space-between; align-items:center; z-index:2; }
    .brand { display:flex; align-items:center; gap:calc(18 * var(--u)); }
    .brand-mark { width:calc(64 * var(--u)); height:calc(64 * var(--u)); background:url('../고용노동부.png') center/contain no-repeat; flex-shrink:0; }
    .brand-text .ko { font-size:calc(26 * var(--u)); font-weight:700; color:#f1f5f9; letter-spacing:0.01em; }
    .brand-text .en { font-size:calc(12 * var(--u)); font-weight:500; color:#94a3b8; letter-spacing:0.14em; text-transform:uppercase; margin-top:calc(2 * var(--u)); }
    .venue { text-align:right; line-height:1.4; }
    .venue-label { display:block; font-size:calc(13 * var(--u)); color:#94a3b8; font-weight:500; letter-spacing:0.18em; margin-bottom:calc(6 * var(--u)); }
    .venue-text { font-size:calc(20 * var(--u)); color:#e2e8f0; font-weight:500; }

    /* Center content */
    .center {
      position:absolute;
      left:0; right:0; top:0; bottom:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:2; gap:calc(28 * var(--u));
    }

    .qa-badge {
      display:inline-flex; align-items:center; gap:calc(10 * var(--u));
      background:rgba(56,189,248,0.10);
      border:1px solid rgba(56,189,248,0.28);
      border-radius:calc(6 * var(--u));
      padding:calc(6 * var(--u)) calc(20 * var(--u));
      font-size:calc(18 * var(--u)); font-weight:700; color:#7dd3fc;
      letter-spacing:0.24em;
    }
    .qa-dot {
      width:calc(8 * var(--u)); height:calc(8 * var(--u));
      border-radius:50%; background:#38bdf8;
      box-shadow:0 0 calc(6 * var(--u)) rgba(56,189,248,0.8);
      animation:live 1.6s ease-in-out infinite;
    }
    @keyframes live { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

    .main-text {
      font-size:calc(110 * var(--u)); font-weight:900; color:#f8fafc;
      letter-spacing:-0.03em; line-height:1;
      text-shadow:0 0 calc(60 * var(--u)) rgba(56,189,248,0.12);
    }

    .divider {
      width:calc(80 * var(--u)); height:calc(2 * var(--u));
      background:linear-gradient(90deg,transparent,rgba(56,189,248,0.40),transparent);
    }

    .presenter {
      text-align:center;
      display:flex; flex-direction:column; gap:calc(6 * var(--u));
    }
    .presenter-name { font-size:calc(22 * var(--u)); font-weight:600; color:#94a3b8; letter-spacing:0.04em; }
    .presenter-date { font-size:calc(17 * var(--u)); color:#475569; letter-spacing:0.10em; }

    /* Footer */
    .slide-foot { position:absolute; left:calc(120 * var(--u)); bottom:calc(36 * var(--u)); z-index:2; font-size:calc(13 * var(--u)); font-weight:500; letter-spacing:0.22em; color:#64748b; }
    .slide-foot .cur { color:#94a3b8; }
  </style>
</head>
<body>
  <div class="slide-wrap"><div class="slide">

    <div class="bg-glow"></div>

    <header class="slide-top">
      <div class="brand">
        <div class="brand-mark"></div>
        <div class="brand-text">
          <div class="ko">고용노동부</div>
          <div class="en">Ministry of Employment and Labor</div>
        </div>
      </div>
      <div class="venue">
        <span class="venue-label">장소</span>
        <span class="venue-text">국가인공지능전략위원회 세미나</span>
      </div>
    </header>

    <div class="center">
      <div class="main-text">감사합니다</div>
      <div class="qa-badge">
        <div class="qa-dot"></div>
        Q &amp; A
      </div>
      <div class="divider"></div>
      <div class="presenter">
        <div class="presenter-name">고용노동부 지능정보화기획팀장 &nbsp; 김동현</div>
        <div class="presenter-date">2026. 5. 7.</div>
      </div>
    </div>

    <div class="slide-foot"><span class="cur">18</span> / 18</div>
  </div></div>
</body>
</html>
